services:
  postgres:
    image: postgres:15-alpine
    container_name: espace-postgres
    environment:
      POSTGRES_USER: espace
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: espace_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - backups_data:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U espace -d espace_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - espace_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: espace-backend
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL}
      APP_URL: ${APP_URL}
      API_URL: ${API_URL}
      CORS_ORIGIN: ${CORS_ORIGIN}
      CORS_ALLOW_VERCEL_PREVIEWS: ${CORS_ALLOW_VERCEL_PREVIEWS:-false}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      TRUST_PROXY: ${TRUST_PROXY:-true}
      LOG_HTTP: ${LOG_HTTP:-false}
      APP_VERSION: ${APP_VERSION:-0.1.0-beta}
      FILE_STORAGE_PROVIDER: ${FILE_STORAGE_PROVIDER:-LOCAL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-}
      NOTIFICATIONS_EXTERNAL_ENABLED: ${NOTIFICATIONS_EXTERNAL_ENABLED:-true}
      NOTIFICATIONS_DEV_MODE: ${NOTIFICATIONS_DEV_MODE:-false}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-console}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Espace}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-no-reply@espace.md}
      EMAIL_REPLY_TO: ${EMAIL_REPLY_TO:-support@espace.md}
      EMAIL_FROM: ${EMAIL_FROM:-Espace <no-reply@espace.md>}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL:-support@espace.md}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      MAILGUN_API_KEY: ${MAILGUN_API_KEY:-}
      MAILGUN_DOMAIN: ${MAILGUN_DOMAIN:-}
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      MAIL_FROM: ${MAIL_FROM:-Espace <no-reply@espace.md>}
      EMAIL_API_KEY: ${EMAIL_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMS_PROVIDER: ${SMS_PROVIDER:-CONSOLE}
      SMS_FROM: ${SMS_FROM:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
      CUSTOM_SMS_ENDPOINT: ${CUSTOM_SMS_ENDPOINT:-}
      CUSTOM_SMS_API_KEY: ${CUSTOM_SMS_API_KEY:-}
      ENABLE_GOOGLE_AUTH: ${ENABLE_GOOGLE_AUTH:-false}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-}
      ENABLE_DEMO_LOGIN: ${ENABLE_DEMO_LOGIN:-false}
      ALLOW_LEGACY_ADMIN_PERMISSION_FALLBACK: ${ALLOW_LEGACY_ADMIN_PERMISSION_FALLBACK:-false}
      PAYMENTS_EXTERNAL_ENABLED: ${PAYMENTS_EXTERNAL_ENABLED:-false}
      PAYMENTS_TEST_MODE: ${PAYMENTS_TEST_MODE:-true}
      BPAY_ENABLED: ${BPAY_ENABLED:-false}
      BPAY_MERCHANT_ID: ${BPAY_MERCHANT_ID:-}
      BPAY_API_KEY: ${BPAY_API_KEY:-}
      BPAY_SECRET: ${BPAY_SECRET:-}
      ENABLE_CHANNELS_UI: ${ENABLE_CHANNELS_UI:-false}
      SEED: "false"
      SEED_DEMO: "false"
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - espace_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: espace-frontend
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL}
      NEXT_PUBLIC_DEFAULT_LOCALE: ${NEXT_PUBLIC_DEFAULT_LOCALE:-ro}
      NEXT_PUBLIC_ENABLE_BILLING_UI: "false"
      NEXT_PUBLIC_ENABLE_SOFT_LIMITS: "false"
      NEXT_PUBLIC_ENABLE_CHANNELS_UI: "false"
      NEXT_PUBLIC_ENABLE_GOOGLE_AUTH: ${NEXT_PUBLIC_ENABLE_GOOGLE_AUTH:-false}
      NEXT_PUBLIC_ENABLE_DEMO_LOGIN: ${NEXT_PUBLIC_ENABLE_DEMO_LOGIN:-false}
      NEXT_PUBLIC_ENABLE_DEMO: ${NEXT_PUBLIC_ENABLE_DEMO:-false}
      NEXT_PUBLIC_DEMO_MODE: ${NEXT_PUBLIC_DEMO_MODE:-false}
      NEXT_PUBLIC_REQUIRE_BETA_ACCESS: ${NEXT_PUBLIC_REQUIRE_BETA_ACCESS:-false}
      NEXT_PUBLIC_SHOW_DEV_RESET_LINK: ${NEXT_PUBLIC_SHOW_DEV_RESET_LINK:-false}
      NEXT_PUBLIC_DEBUG_API: ${NEXT_PUBLIC_DEBUG_API:-false}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY:-}
      NEXT_PUBLIC_APP_VERSION: ${NEXT_PUBLIC_APP_VERSION:-0.1.0-beta}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - espace_net

networks:
  espace_net:
    driver: bridge

volumes:
  postgres_data:
  backups_data:
