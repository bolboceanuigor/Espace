services:
  postgres:
    image: postgres:15-alpine
    container_name: espace-postgres
    environment:
      POSTGRES_USER: espace
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: espace_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - backups_data:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U espace -d espace_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - espace_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: espace-backend
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://espace:${POSTGRES_PASSWORD}@postgres:5432/espace_db?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL}
      API_URL: ${API_URL}
      CORS_ORIGIN: ${CORS_ORIGIN}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      LOG_HTTP: ${LOG_HTTP:-false}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-console}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL:-support@espacepms.com}
      ENABLE_GOOGLE_AUTH: "false"
      ENABLE_CHANNELS_UI: ${ENABLE_CHANNELS_UI:-false}
      SEED: "false"
      SEED_DEMO: "false"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - espace_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: espace-frontend
    environment:
      NODE_ENV: production
      PORT: 3000
      API_URL: ${API_URL}
      CORS_ORIGIN: ${CORS_ORIGIN}
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: ${DATABASE_URL}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL}
      NEXT_PUBLIC_DEFAULT_LOCALE: ${NEXT_PUBLIC_DEFAULT_LOCALE:-ro}
      NEXT_PUBLIC_ENABLE_BILLING_UI: "false"
      NEXT_PUBLIC_ENABLE_SOFT_LIMITS: "false"
      NEXT_PUBLIC_ENABLE_CHANNELS_UI: "false"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - espace_net

networks:
  espace_net:
    driver: bridge

volumes:
  postgres_data:
  backups_data:
