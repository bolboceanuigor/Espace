<!doctype html>
<html lang="ro">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0F172A" />
    <title>Espace offline</title>
    <style>
      :root { color-scheme: light; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8fafc;
        color: #0f172a;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(420px, calc(100% - 32px));
        border: 1px solid #e2e8f0;
        border-radius: 24px;
        background: #fff;
        padding: 28px;
        box-shadow: 0 20px 45px -38px rgba(15, 23, 42, 0.5);
      }
      .icon {
        width: 48px;
        height: 48px;
        display: grid;
        place-items: center;
        border-radius: 18px;
        background: #ecfdf5;
        color: #047857;
        font-weight: 800;
      }
      h1 { margin: 18px 0 8px; font-size: 22px; }
      p { margin: 0; color: #64748b; line-height: 1.6; }
      a {
        margin-top: 20px;
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 16px;
        padding: 0 16px;
        background: #0f172a;
        color: #fff;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="icon">E</div>
      <h1>Ești offline</h1>
      <p>Portalul Espace nu poate încărca această pagină fără conexiune. Datele sensibile nu sunt salvate în cache offline.</p>
      <a href="/ro/resident">Încearcă din nou</a>
    </main>
  </body>
</html>
